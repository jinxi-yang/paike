# 北清商学院排课系统 - Nginx 反向代理配置
# 使用方式：
#   1. 在 nginx 所在服务器的 server 块中 include 此文件
#   2. 重载 nginx: nginx -t && nginx -s reload
#
# ⚠️ 修改下面的 IP 为排课系统所在服务器的实际 IP
# 访问地址: http://你的域名/paike/

location /paike/ {
    proxy_pass http://10.156.195.35:5000/;   # 排课系统服务器IP:端口，尾部斜杠自动去掉 /paike 前缀
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 支持（如需要）
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 超时设置（排课计算可能耗时较长）
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}
